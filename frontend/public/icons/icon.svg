<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 -->
  <rect width="512" height="512" rx="96" fill="#1c1917"/>

  <!-- 필름 스트립 본체 -->
  <rect x="64" y="156" width="384" height="188" rx="14" fill="#292524"/>

  <!-- 필름 구멍 - 왼쪽 열 -->
  <rect x="40" y="182" width="40" height="32" rx="7" fill="#1c1917"/>
  <rect x="40" y="230" width="40" height="32" rx="7" fill="#1c1917"/>
  <rect x="40" y="278" width="40" height="32" rx="7" fill="#1c1917"/>

  <!-- 필름 구멍 - 오른쪽 열 -->
  <rect x="432" y="182" width="40" height="32" rx="7" fill="#1c1917"/>
  <rect x="432" y="230" width="40" height="32" rx="7" fill="#1c1917"/>
  <rect x="432" y="278" width="40" height="32" rx="7" fill="#1c1917"/>

  <!-- 사진 프레임 왼쪽 -->
  <rect x="100" y="175" width="136" height="150" rx="8" fill="#44403c"/>
  <!-- 산 실루엣 -->
  <polygon points="100,325 168,240 236,325" fill="#78716c"/>
  <polygon points="130,325 178,268 236,325" fill="#a8a29e"/>
  <!-- 태양 -->
  <circle cx="190" cy="210" r="18" fill="#fbbf24"/>

  <!-- 사진 프레임 오른쪽 -->
  <rect x="256" y="175" width="136" height="150" rx="8" fill="#57534e"/>
  <!-- 사람 실루엣 -->
  <circle cx="324" cy="218" r="22" fill="#a8a29e"/>
  <rect x="294" y="248" width="60" height="52" rx="10" fill="#78716c"/>

  <!-- 하루필름 텍스트 -->
  <text x="256" y="406" font-family="serif" font-size="58" font-weight="bold" text-anchor="middle" fill="#e7e5e4" letter-spacing="3">하루필름</text>
</svg>
